name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build et déploiement
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build Vite. Les VITE_* sont injectés depuis les secrets GitHub (jamais commités).
      # S'ils sont absents, l'app se déploie en MODE LOCAL (sans SharePoint).
      - name: Installer et compiler
        run: |
          npm ci
          npm run build
        env:
          VITE_ENTRA_TENANT_ID: ${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_SP_HOSTNAME: ${{ secrets.VITE_SP_HOSTNAME }}
          VITE_SP_SITE_PATH: ${{ secrets.VITE_SP_SITE_PATH }}
          VITE_SP_INDEX_LIST: PPT-Index
          VITE_SP_DATA_LIBRARY: PPT-Data

      # Empreinte unique du service worker à chaque déploiement → l'app détecte la nouvelle
      # version et se met à jour toute seule (voir public/sw.js et src/pwa.js).
      - name: Versionner le service worker
        run: sed -i "s/__BUILD_ID__/${GITHUB_SHA}/g" dist/sw.js

      - name: Déployer vers Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "dist"      # dossier déjà compilé
          skip_app_build: true       # on a déjà fait `npm run build` ci-dessus
          output_location: ""

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Fermer l'environnement de PR
    steps:
      - name: Fermer
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
